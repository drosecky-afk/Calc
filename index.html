<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1c1c1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Davidova kalkulačka</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="calculator">
    <h1 class="title">Davidova kalkulačka</h1>
    <div class="display">
      <div class="history" id="history"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="keys">
      <button class="key fn" data-action="clear">C</button>
      <button class="key fn" data-action="sign">+/−</button>
      <button class="key fn" data-action="percent">%</button>
      <button class="key op" data-action="op" data-op="/">÷</button>

      <button class="key num" data-action="num" data-num="7">7</button>
      <button class="key num" data-action="num" data-num="8">8</button>
      <button class="key num" data-action="num" data-num="9">9</button>
      <button class="key op" data-action="op" data-op="*">×</button>

      <button class="key num" data-action="num" data-num="4">4</button>
      <button class="key num" data-action="num" data-num="5">5</button>
      <button class="key num" data-action="num" data-num="6">6</button>
      <button class="key op" data-action="op" data-op="-">−</button>

      <button class="key num" data-action="num" data-num="1">1</button>
      <button class="key num" data-action="num" data-num="2">2</button>
      <button class="key num" data-action="num" data-num="3">3</button>
      <button class="key op" data-action="op" data-op="+">+</button>

      <button class="key num zero" data-action="num" data-num="0">0</button>
      <button class="key num" data-action="dot">,</button>
      <button class="key op" data-action="equals">=</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
